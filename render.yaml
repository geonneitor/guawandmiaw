services:
  - type: web
    name: guaw-miaw-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn "backend.app:create_app()"
    envVars:
      - key: FLASK_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: "*"
